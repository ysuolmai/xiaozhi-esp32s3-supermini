name: Build ESP32-S3 SuperMini Firmware

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout this repo
      uses: actions/checkout@v4
      with:
        path: board-config

    - name: Checkout xiaozhi-esp32
      uses: actions/checkout@v4
      with:
        repository: 78/xiaozhi-esp32
        path: xiaozhi-esp32
        submodules: recursive
        fetch-depth: 1
      timeout-minutes: 30

    - name: Setup board configuration
      run: |
        mkdir -p xiaozhi-esp32/main/boards/esp32s3-supermini
        cp board-config/config.h xiaozhi-esp32/main/boards/esp32s3-supermini/
        cp board-config/config.json xiaozhi-esp32/main/boards/esp32s3-supermini/
        cp board-config/esp32s3_supermini_board.cc xiaozhi-esp32/main/boards/esp32s3-supermini/
        python3 board-config/scripts/setup_board.py xiaozhi-esp32/main

    - name: Install ESP-IDF
      run: |
        sudo apt-get update
        sudo apt-get install -y git wget flex bison gperf python3 python3-pip python3-venv cmake ninja-build ccache libffi-dev libssl-dev dfu-util libusb-1.0-0
        git clone -b v5.5.2 --depth 1 https://github.com/espressif/esp-idf.git ~/esp-idf
        cd ~/esp-idf
        git submodule update --init --recursive --depth 1
        ./install.sh esp32s3

    - name: Build firmware
      run: |
        source ~/esp-idf/export.sh
        cd xiaozhi-esp32
        
        # 使用官方构建方式：先set-target，再追加配置到sdkconfig
        idf.py set-target esp32s3
        
        # 追加配置到sdkconfig（模仿release.py）
        echo "" >> sdkconfig
        echo "# Append for ESP32-S3 SuperMini" >> sdkconfig
        echo "CONFIG_BOARD_TYPE_ESP32S3_SUPERMINI=y" >> sdkconfig
        echo "CONFIG_ESPTOOLPY_FLASHSIZE_4MB=y" >> sdkconfig
        echo 'CONFIG_ESPTOOLPY_FLASHSIZE="4MB"' >> sdkconfig
        echo "CONFIG_ESPTOOLPY_FLASHMODE_QIO=y" >> sdkconfig
        echo 'CONFIG_ESPTOOLPY_FLASHMODE="qio"' >> sdkconfig
        echo "CONFIG_ESPTOOLPY_FLASH_SAMPLE_MODE_STR=y" >> sdkconfig
        echo "CONFIG_ESPTOOLPY_FLASHFREQ_80M=y" >> sdkconfig
        echo "CONFIG_PARTITION_TABLE_CUSTOM=y" >> sdkconfig
        echo 'CONFIG_PARTITION_TABLE_CUSTOM_FILENAME="partitions/v2/4m.csv"' >> sdkconfig
        # ESP32-S3FH4R2: 4MB Quad SPI Flash / 2MB Quad SPI PSRAM / 512KB SRAM
        echo "CONFIG_SPIRAM=y" >> sdkconfig
        echo "CONFIG_SPIRAM_MODE_QUAD=y" >> sdkconfig
        echo "CONFIG_SPIRAM_TYPE_AUTO=y" >> sdkconfig
        echo "CONFIG_SPIRAM_SPEED_80M=y" >> sdkconfig
        echo "CONFIG_SPIRAM_USE_MALLOC=y" >> sdkconfig
        echo "CONFIG_SPIRAM_MALLOC_ALWAYSINTERNAL=16384" >> sdkconfig
        echo "CONFIG_SPIRAM_MALLOC_RESERVE_INTERNAL=32768" >> sdkconfig
        echo "CONFIG_ESP_WIFI_STATIC_RX_BUFFER_NUM=6" >> sdkconfig
        echo "CONFIG_ESP_WIFI_DYNAMIC_RX_BUFFER_NUM=16" >> sdkconfig
        echo "CONFIG_ESP_WIFI_RX_BA_WIN=6" >> sdkconfig
        echo "CONFIG_COMPILER_OPTIMIZATION_SIZE=y" >> sdkconfig
        # 启用离线唤醒词（必须先禁用默认的DISABLED，再启用ESP_WAKE_WORD）
        echo "# CONFIG_WAKE_WORD_DISABLED is not set" >> sdkconfig
        echo "CONFIG_USE_ESP_WAKE_WORD=y" >> sdkconfig
        echo "CONFIG_SR_WN_WN9S_NIHAOXIAOZHI=y" >> sdkconfig
        
        # 重新配置并构建
        idf.py reconfigure
        idf.py -DBOARD_NAME=esp32s3-supermini -DBOARD_TYPE=esp32s3-supermini build
        # 验证 generated_assets.bin 已生成（包含唤醒词模型）
        ls -la build/generated_assets.bin
      timeout-minutes: 60

    - name: Upload firmware artifact
      uses: actions/upload-artifact@v4
      with:
        name: esp32s3-supermini-firmware
        path: |
          xiaozhi-esp32/build/xiaozhi.bin
          xiaozhi-esp32/build/generated_assets.bin
          xiaozhi-esp32/build/bootloader/*.bin
          xiaozhi-esp32/build/partition_table/*.bin
        retention-days: 30
